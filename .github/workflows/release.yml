name: Release Stormcell MediaUploader Package

on:
  push:
    tags:
      - "v*" # Triggers on v1.0.0, v2.1.0, etc.

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
        laravel: [11.*, 12.*, 13.*]

    name: P-${{ matrix.php }} - L-${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, gd # Added 'gd' since you do image processing
          coverage: none

      - name: Install dependencies
        run: |
          # 1. Update the framework constraint inline without moving it to require-dev
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update

          # 2. Update all dependencies with audit policies ignored to bypass security advisory blocks on older versions
          composer update --prefer-stable --no-interaction --no-progress --audit-policy=ignore

      - name: Execute tests
        run: vendor/bin/phpunit

  create-release:
    needs: run-tests # Only creates a release if tests pass!
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
